name = "portfolio"
compatibility_date = "2024-01-01"

pages_build_output_dir = "dist"

[env.production]
routes = ["*"]

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Weekly rebuild via Cloudflare Cron Triggers
# To enable:
# 1. Add a Cron Trigger in Cloudflare Dashboard for this Pages project
# 2. Set schedule to weekly (e.g., "0 0 * * 0" for Sunday midnight)
# 3. The webhook URL will be available under "Deploy Hooks"
# 4. Use an external cron service (e.g., cron-job.org) to call the hook
