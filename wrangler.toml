name = "portfolio"
compatibility_date = "2024-01-01"

[build]
command = "bun run build"
output = "dist/"

[build.environment]
NODE_VERSION = "20"

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
